<svg viewBox="0 0 720 480" xmlns="http://www.w3.org/2000/svg" font-family="var(--font-sans)" font-size="13">
  <defs>
    <marker id="arrow" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
      <path d="M0,0 L0,6 L8,3 z" fill="#888780"/>
    </marker>
  </defs>

  <!-- Title -->
  <text x="360" y="28" text-anchor="middle" font-size="15" font-weight="500" fill="var(--color-text-primary)" style="fill:rgb(250, 249, 245);stroke:none;color:rgb(255, 255, 255);stroke-width:1px;stroke-linecap:butt;stroke-linejoin:miter;opacity:1;font-family:&quot;Anthropic Sans&quot;, sans-serif;font-size:15px;font-weight:500;text-anchor:middle;dominant-baseline:auto">LAN file share — system overview</text>

  <!-- HOST MACHINE -->
  <rect x="30" y="55" width="200" height="360" rx="10" fill="#E6F1FB" stroke="#378ADD" stroke-width="0.5" style="fill:rgb(230, 241, 251);stroke:rgb(55, 138, 221);color:rgb(255, 255, 255);stroke-width:0.5px;stroke-linecap:butt;stroke-linejoin:miter;opacity:1;font-family:&quot;Anthropic Sans&quot;, sans-serif;font-size:13px;font-weight:400;text-anchor:start;dominant-baseline:auto"/>
  <text x="130" y="78" text-anchor="middle" font-weight="500" fill="#0C447C" font-size="13" style="fill:rgb(12, 68, 124);stroke:none;color:rgb(255, 255, 255);stroke-width:1px;stroke-linecap:butt;stroke-linejoin:miter;opacity:1;font-family:&quot;Anthropic Sans&quot;, sans-serif;font-size:13px;font-weight:500;text-anchor:middle;dominant-baseline:auto">Your machine (host)</text>

  <!-- Electron shell -->
  <rect x="48" y="90" width="164" height="36" rx="6" fill="#B5D4F4" stroke="#378ADD" stroke-width="0.5" style="fill:rgb(181, 212, 244);stroke:rgb(55, 138, 221);color:rgb(255, 255, 255);stroke-width:0.5px;stroke-linecap:butt;stroke-linejoin:miter;opacity:1;font-family:&quot;Anthropic Sans&quot;, sans-serif;font-size:13px;font-weight:400;text-anchor:start;dominant-baseline:auto"/>
  <text x="130" y="112" text-anchor="middle" fill="#0C447C" font-size="12" style="fill:rgb(12, 68, 124);stroke:none;color:rgb(255, 255, 255);stroke-width:1px;stroke-linecap:butt;stroke-linejoin:miter;opacity:1;font-family:&quot;Anthropic Sans&quot;, sans-serif;font-size:12px;font-weight:400;text-anchor:middle;dominant-baseline:auto">Electron shell</text>

  <!-- React UI -->
  <rect x="48" y="138" width="164" height="36" rx="6" fill="#B5D4F4" stroke="#378ADD" stroke-width="0.5" style="fill:rgb(181, 212, 244);stroke:rgb(55, 138, 221);color:rgb(255, 255, 255);stroke-width:0.5px;stroke-linecap:butt;stroke-linejoin:miter;opacity:1;font-family:&quot;Anthropic Sans&quot;, sans-serif;font-size:13px;font-weight:400;text-anchor:start;dominant-baseline:auto"/>
  <text x="130" y="160" text-anchor="middle" fill="#0C447C" font-size="12" style="fill:rgb(12, 68, 124);stroke:none;color:rgb(255, 255, 255);stroke-width:1px;stroke-linecap:butt;stroke-linejoin:miter;opacity:1;font-family:&quot;Anthropic Sans&quot;, sans-serif;font-size:12px;font-weight:400;text-anchor:middle;dominant-baseline:auto">React UI (Drive-like)</text>

  <!-- Node.js backend -->
  <rect x="48" y="186" width="164" height="36" rx="6" fill="#B5D4F4" stroke="#378ADD" stroke-width="0.5" style="fill:rgb(181, 212, 244);stroke:rgb(55, 138, 221);color:rgb(255, 255, 255);stroke-width:0.5px;stroke-linecap:butt;stroke-linejoin:miter;opacity:1;font-family:&quot;Anthropic Sans&quot;, sans-serif;font-size:13px;font-weight:400;text-anchor:start;dominant-baseline:auto"/>
  <text x="130" y="208" text-anchor="middle" fill="#0C447C" font-size="12" style="fill:rgb(12, 68, 124);stroke:none;color:rgb(255, 255, 255);stroke-width:1px;stroke-linecap:butt;stroke-linejoin:miter;opacity:1;font-family:&quot;Anthropic Sans&quot;, sans-serif;font-size:12px;font-weight:400;text-anchor:middle;dominant-baseline:auto">Node.js backend</text>

  <!-- Express HTTP server -->
  <rect x="48" y="234" width="164" height="36" rx="6" fill="#9FE1CB" stroke="#1D9E75" stroke-width="0.5" style="fill:rgb(159, 225, 203);stroke:rgb(29, 158, 117);color:rgb(255, 255, 255);stroke-width:0.5px;stroke-linecap:butt;stroke-linejoin:miter;opacity:1;font-family:&quot;Anthropic Sans&quot;, sans-serif;font-size:13px;font-weight:400;text-anchor:start;dominant-baseline:auto"/>
  <text x="130" y="255" text-anchor="middle" fill="#085041" font-size="12" style="fill:rgb(8, 80, 65);stroke:none;color:rgb(255, 255, 255);stroke-width:1px;stroke-linecap:butt;stroke-linejoin:miter;opacity:1;font-family:&quot;Anthropic Sans&quot;, sans-serif;font-size:12px;font-weight:400;text-anchor:middle;dominant-baseline:auto">Express HTTP server</text>

  <!-- Socket.io -->
  <rect x="48" y="282" width="164" height="36" rx="6" fill="#9FE1CB" stroke="#1D9E75" stroke-width="0.5" style="fill:rgb(159, 225, 203);stroke:rgb(29, 158, 117);color:rgb(255, 255, 255);stroke-width:0.5px;stroke-linecap:butt;stroke-linejoin:miter;opacity:1;font-family:&quot;Anthropic Sans&quot;, sans-serif;font-size:13px;font-weight:400;text-anchor:start;dominant-baseline:auto"/>
  <text x="130" y="303" text-anchor="middle" fill="#085041" font-size="12" style="fill:rgb(8, 80, 65);stroke:none;color:rgb(255, 255, 255);stroke-width:1px;stroke-linecap:butt;stroke-linejoin:miter;opacity:1;font-family:&quot;Anthropic Sans&quot;, sans-serif;font-size:12px;font-weight:400;text-anchor:middle;dominant-baseline:auto">Socket.io (live events)</text>

  <!-- mDNS discovery -->
  <rect x="48" y="330" width="164" height="36" rx="6" fill="#FAC775" stroke="#BA7517" stroke-width="0.5" style="fill:rgb(250, 199, 117);stroke:rgb(186, 117, 23);color:rgb(255, 255, 255);stroke-width:0.5px;stroke-linecap:butt;stroke-linejoin:miter;opacity:1;font-family:&quot;Anthropic Sans&quot;, sans-serif;font-size:13px;font-weight:400;text-anchor:start;dominant-baseline:auto"/>
  <text x="130" y="351" text-anchor="middle" fill="#633806" font-size="12" style="fill:rgb(99, 56, 6);stroke:none;color:rgb(255, 255, 255);stroke-width:1px;stroke-linecap:butt;stroke-linejoin:miter;opacity:1;font-family:&quot;Anthropic Sans&quot;, sans-serif;font-size:12px;font-weight:400;text-anchor:middle;dominant-baseline:auto">mDNS / Bonjour</text>

  <!-- File system -->
  <rect x="48" y="378" width="164" height="26" rx="6" fill="#D3D1C7" stroke="#888780" stroke-width="0.5" style="fill:rgb(211, 209, 199);stroke:rgb(136, 135, 128);color:rgb(255, 255, 255);stroke-width:0.5px;stroke-linecap:butt;stroke-linejoin:miter;opacity:1;font-family:&quot;Anthropic Sans&quot;, sans-serif;font-size:13px;font-weight:400;text-anchor:start;dominant-baseline:auto"/>
  <text x="130" y="395" text-anchor="middle" fill="#2C2C2A" font-size="12" style="fill:rgb(44, 44, 42);stroke:none;color:rgb(255, 255, 255);stroke-width:1px;stroke-linecap:butt;stroke-linejoin:miter;opacity:1;font-family:&quot;Anthropic Sans&quot;, sans-serif;font-size:12px;font-weight:400;text-anchor:middle;dominant-baseline:auto">Local file system</text>

  <!-- LAN CLOUD -->
  <ellipse cx="360" cy="240" rx="58" ry="40" fill="#F1EFE8" stroke="#888780" stroke-width="0.5" stroke-dasharray="5,3" style="fill:rgb(241, 239, 232);stroke:rgb(136, 135, 128);color:rgb(255, 255, 255);stroke-width:0.5px;stroke-dasharray:5px, 3px;stroke-linecap:butt;stroke-linejoin:miter;opacity:1;font-family:&quot;Anthropic Sans&quot;, sans-serif;font-size:13px;font-weight:400;text-anchor:start;dominant-baseline:auto"/>
  <text x="360" y="235" text-anchor="middle" fill="#5F5E5A" font-size="12" style="fill:rgb(95, 94, 90);stroke:none;color:rgb(255, 255, 255);stroke-width:1px;stroke-linecap:butt;stroke-linejoin:miter;opacity:1;font-family:&quot;Anthropic Sans&quot;, sans-serif;font-size:12px;font-weight:400;text-anchor:middle;dominant-baseline:auto">Local</text>
  <text x="360" y="252" text-anchor="middle" fill="#5F5E5A" font-size="12" style="fill:rgb(95, 94, 90);stroke:none;color:rgb(255, 255, 255);stroke-width:1px;stroke-linecap:butt;stroke-linejoin:miter;opacity:1;font-family:&quot;Anthropic Sans&quot;, sans-serif;font-size:12px;font-weight:400;text-anchor:middle;dominant-baseline:auto">Network</text>

  <!-- CLIENT MACHINES -->
  <rect x="490" y="55" width="200" height="175" rx="10" fill="#EEEDFE" stroke="#7F77DD" stroke-width="0.5" style="fill:rgb(238, 237, 254);stroke:rgb(127, 119, 221);color:rgb(255, 255, 255);stroke-width:0.5px;stroke-linecap:butt;stroke-linejoin:miter;opacity:1;font-family:&quot;Anthropic Sans&quot;, sans-serif;font-size:13px;font-weight:400;text-anchor:start;dominant-baseline:auto"/>
  <text x="590" y="78" text-anchor="middle" font-weight="500" fill="#3C3489" font-size="13" style="fill:rgb(60, 52, 137);stroke:none;color:rgb(255, 255, 255);stroke-width:1px;stroke-linecap:butt;stroke-linejoin:miter;opacity:1;font-family:&quot;Anthropic Sans&quot;, sans-serif;font-size:13px;font-weight:500;text-anchor:middle;dominant-baseline:auto">Client (browser)</text>

  <rect x="508" y="90" width="164" height="36" rx="6" fill="#CECBF6" stroke="#7F77DD" stroke-width="0.5" style="fill:rgb(206, 203, 246);stroke:rgb(127, 119, 221);color:rgb(255, 255, 255);stroke-width:0.5px;stroke-linecap:butt;stroke-linejoin:miter;opacity:1;font-family:&quot;Anthropic Sans&quot;, sans-serif;font-size:13px;font-weight:400;text-anchor:start;dominant-baseline:auto"/>
  <text x="590" y="112" text-anchor="middle" fill="#26215C" font-size="12" style="fill:rgb(38, 33, 92);stroke:none;color:rgb(255, 255, 255);stroke-width:1px;stroke-linecap:butt;stroke-linejoin:miter;opacity:1;font-family:&quot;Anthropic Sans&quot;, sans-serif;font-size:12px;font-weight:400;text-anchor:middle;dominant-baseline:auto">Any browser</text>

  <rect x="508" y="138" width="164" height="36" rx="6" fill="#CECBF6" stroke="#7F77DD" stroke-width="0.5" style="fill:rgb(206, 203, 246);stroke:rgb(127, 119, 221);color:rgb(255, 255, 255);stroke-width:0.5px;stroke-linecap:butt;stroke-linejoin:miter;opacity:1;font-family:&quot;Anthropic Sans&quot;, sans-serif;font-size:13px;font-weight:400;text-anchor:start;dominant-baseline:auto"/>
  <text x="590" y="160" text-anchor="middle" fill="#26215C" font-size="12" style="fill:rgb(38, 33, 92);stroke:none;color:rgb(255, 255, 255);stroke-width:1px;stroke-linecap:butt;stroke-linejoin:miter;opacity:1;font-family:&quot;Anthropic Sans&quot;, sans-serif;font-size:12px;font-weight:400;text-anchor:middle;dominant-baseline:auto">Upload / download files</text>

  <rect x="508" y="186" width="164" height="36" rx="6" fill="#CECBF6" stroke="#7F77DD" stroke-width="0.5" style="fill:rgb(206, 203, 246);stroke:rgb(127, 119, 221);color:rgb(255, 255, 255);stroke-width:0.5px;stroke-linecap:butt;stroke-linejoin:miter;opacity:1;font-family:&quot;Anthropic Sans&quot;, sans-serif;font-size:13px;font-weight:400;text-anchor:start;dominant-baseline:auto"/>
  <text x="590" y="208" text-anchor="middle" fill="#26215C" font-size="12" style="fill:rgb(38, 33, 92);stroke:none;color:rgb(255, 255, 255);stroke-width:1px;stroke-linecap:butt;stroke-linejoin:miter;opacity:1;font-family:&quot;Anthropic Sans&quot;, sans-serif;font-size:12px;font-weight:400;text-anchor:middle;dominant-baseline:auto">Live file list updates</text>

  <!-- CLIENT 2 -->
  <rect x="490" y="260" width="200" height="80" rx="10" fill="#EEEDFE" stroke="#7F77DD" stroke-width="0.5" style="fill:rgb(238, 237, 254);stroke:rgb(127, 119, 221);color:rgb(255, 255, 255);stroke-width:0.5px;stroke-linecap:butt;stroke-linejoin:miter;opacity:1;font-family:&quot;Anthropic Sans&quot;, sans-serif;font-size:13px;font-weight:400;text-anchor:start;dominant-baseline:auto"/>
  <text x="590" y="283" text-anchor="middle" font-weight="500" fill="#3C3489" font-size="13" style="fill:rgb(60, 52, 137);stroke:none;color:rgb(255, 255, 255);stroke-width:1px;stroke-linecap:butt;stroke-linejoin:miter;opacity:1;font-family:&quot;Anthropic Sans&quot;, sans-serif;font-size:13px;font-weight:500;text-anchor:middle;dominant-baseline:auto">Other Electron clients</text>
  <rect x="508" y="294" width="164" height="36" rx="6" fill="#CECBF6" stroke="#7F77DD" stroke-width="0.5" style="fill:rgb(206, 203, 246);stroke:rgb(127, 119, 221);color:rgb(255, 255, 255);stroke-width:0.5px;stroke-linecap:butt;stroke-linejoin:miter;opacity:1;font-family:&quot;Anthropic Sans&quot;, sans-serif;font-size:13px;font-weight:400;text-anchor:start;dominant-baseline:auto"/>
  <text x="590" y="316" text-anchor="middle" fill="#26215C" font-size="12" style="fill:rgb(38, 33, 92);stroke:none;color:rgb(255, 255, 255);stroke-width:1px;stroke-linecap:butt;stroke-linejoin:miter;opacity:1;font-family:&quot;Anthropic Sans&quot;, sans-serif;font-size:12px;font-weight:400;text-anchor:middle;dominant-baseline:auto">Auto-discover via mDNS</text>

  <!-- Arrows: host → LAN -->
  <line x1="212" y1="240" x2="300" y2="240" stroke="#888780" stroke-width="1" marker-end="url(#arrow)" style="fill:rgb(0, 0, 0);stroke:rgb(136, 135, 128);color:rgb(255, 255, 255);stroke-width:1px;stroke-linecap:butt;stroke-linejoin:miter;opacity:1;font-family:&quot;Anthropic Sans&quot;, sans-serif;font-size:13px;font-weight:400;text-anchor:start;dominant-baseline:auto"/>
  <!-- LAN → clients -->
  <line x1="418" y1="200" x2="488" y2="160" stroke="#888780" stroke-width="1" marker-end="url(#arrow)" style="fill:rgb(0, 0, 0);stroke:rgb(136, 135, 128);color:rgb(255, 255, 255);stroke-width:1px;stroke-linecap:butt;stroke-linejoin:miter;opacity:1;font-family:&quot;Anthropic Sans&quot;, sans-serif;font-size:13px;font-weight:400;text-anchor:start;dominant-baseline:auto"/>
  <line x1="418" y1="255" x2="488" y2="295" stroke="#888780" stroke-width="1" marker-end="url(#arrow)" style="fill:rgb(0, 0, 0);stroke:rgb(136, 135, 128);color:rgb(255, 255, 255);stroke-width:1px;stroke-linecap:butt;stroke-linejoin:miter;opacity:1;font-family:&quot;Anthropic Sans&quot;, sans-serif;font-size:13px;font-weight:400;text-anchor:start;dominant-baseline:auto"/>

  <!-- Legend -->
  <rect x="30" y="428" width="12" height="12" rx="2" fill="#B5D4F4" stroke="#378ADD" stroke-width="0.5" style="fill:rgb(181, 212, 244);stroke:rgb(55, 138, 221);color:rgb(255, 255, 255);stroke-width:0.5px;stroke-linecap:butt;stroke-linejoin:miter;opacity:1;font-family:&quot;Anthropic Sans&quot;, sans-serif;font-size:13px;font-weight:400;text-anchor:start;dominant-baseline:auto"/>
  <text x="48" y="439" fill="var(--color-text-secondary)" font-size="11" style="fill:rgb(194, 192, 182);stroke:none;color:rgb(255, 255, 255);stroke-width:1px;stroke-linecap:butt;stroke-linejoin:miter;opacity:1;font-family:&quot;Anthropic Sans&quot;, sans-serif;font-size:11px;font-weight:400;text-anchor:start;dominant-baseline:auto">UI + backend</text>
  <rect x="130" y="428" width="12" height="12" rx="2" fill="#9FE1CB" stroke="#1D9E75" stroke-width="0.5" style="fill:rgb(159, 225, 203);stroke:rgb(29, 158, 117);color:rgb(255, 255, 255);stroke-width:0.5px;stroke-linecap:butt;stroke-linejoin:miter;opacity:1;font-family:&quot;Anthropic Sans&quot;, sans-serif;font-size:13px;font-weight:400;text-anchor:start;dominant-baseline:auto"/>
  <text x="148" y="439" fill="var(--color-text-secondary)" font-size="11" style="fill:rgb(194, 192, 182);stroke:none;color:rgb(255, 255, 255);stroke-width:1px;stroke-linecap:butt;stroke-linejoin:miter;opacity:1;font-family:&quot;Anthropic Sans&quot;, sans-serif;font-size:11px;font-weight:400;text-anchor:start;dominant-baseline:auto">Network layer</text>
  <rect x="240" y="428" width="12" height="12" rx="2" fill="#FAC775" stroke="#BA7517" stroke-width="0.5" style="fill:rgb(250, 199, 117);stroke:rgb(186, 117, 23);color:rgb(255, 255, 255);stroke-width:0.5px;stroke-linecap:butt;stroke-linejoin:miter;opacity:1;font-family:&quot;Anthropic Sans&quot;, sans-serif;font-size:13px;font-weight:400;text-anchor:start;dominant-baseline:auto"/>
  <text x="258" y="439" fill="var(--color-text-secondary)" font-size="11" style="fill:rgb(194, 192, 182);stroke:none;color:rgb(255, 255, 255);stroke-width:1px;stroke-linecap:butt;stroke-linejoin:miter;opacity:1;font-family:&quot;Anthropic Sans&quot;, sans-serif;font-size:11px;font-weight:400;text-anchor:start;dominant-baseline:auto">Discovery</text>
  <rect x="330" y="428" width="12" height="12" rx="2" fill="#CECBF6" stroke="#7F77DD" stroke-width="0.5" style="fill:rgb(206, 203, 246);stroke:rgb(127, 119, 221);color:rgb(255, 255, 255);stroke-width:0.5px;stroke-linecap:butt;stroke-linejoin:miter;opacity:1;font-family:&quot;Anthropic Sans&quot;, sans-serif;font-size:13px;font-weight:400;text-anchor:start;dominant-baseline:auto"/>
  <text x="348" y="439" fill="var(--color-text-secondary)" font-size="11" style="fill:rgb(194, 192, 182);stroke:none;color:rgb(255, 255, 255);stroke-width:1px;stroke-linecap:butt;stroke-linejoin:miter;opacity:1;font-family:&quot;Anthropic Sans&quot;, sans-serif;font-size:11px;font-weight:400;text-anchor:start;dominant-baseline:auto">Clients</text>
</svg>